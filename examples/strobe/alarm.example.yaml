# Knight Rider-style woosh: sweeps leftâ†’centreâ†’rightâ†’centre and loops,
# giving a smooth back-and-forth bounce rather than a hard jump-cut reset.
steps:
  - duration_ms: 80
    flags: SIGNAL_LEFT | LIGHT_OFF | FOG_FRONT_OFF | FOG_REAR_OFF
