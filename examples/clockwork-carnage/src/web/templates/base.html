<!doctype html>
<html lang="en" class="bg-gray-50 text-gray-900">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Clockwork Carnage{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      [x-cloak] {
        display: none !important;
      }
    </style>
    <script src="https://unpkg.com/htmx.org@2" defer></script>
    <script>
      // x-localtime: reads a <time datetime="..."> UTC value, renders in the
      // visitor's local timezone. Within 3 hours of the time, switches to a
      // live countdown. The raw UTC string is kept as a title tooltip.
      document.addEventListener('alpine:init', () => {
        Alpine.directive('localtime', (el, _bindings, { cleanup }) => {
          const raw = el.getAttribute('datetime');
          if (!raw) return;
          const date = new Date(raw);
          if (isNaN(date.getTime())) return;

          if (!el.hasAttribute('title')) {
            el.setAttribute('title', raw);
          }

          const THREE_HOURS = 3 * 60 * 60 * 1000;
          let timer = null;

          function render() {
            const diffMs = date - Date.now();

            if (diffMs > 0 && diffMs <= THREE_HOURS) {
              const totalSecs = Math.ceil(diffMs / 1000);
              const h = Math.floor(totalSecs / 3600);
              const m = Math.floor((totalSecs % 3600) / 60);
              const s = totalSecs % 60;
              el.textContent =
                h > 0
                  ? `in ${h}h ${String(m).padStart(2, '0')}m ${String(s).padStart(2, '0')}s`
                  : m > 0
                  ? `in ${m}m ${String(s).padStart(2, '0')}s`
                  : `in ${s}s`;
            } else {
              el.textContent = date.toLocaleString(undefined, {
                dateStyle: 'short',
                timeStyle: 'short',
              });
              if (diffMs <= 0 && timer) {
                clearInterval(timer);
                timer = null;
              }
            }
          }

          render();
          if (date > new Date()) {
            timer = setInterval(render, 1000);
          }
          cleanup(() => { if (timer) clearInterval(timer); });
        });
      });
    </script>
    <script
      src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"
      defer
    ></script>
  </head>
  <body
    class="bg-gray-50 text-gray-900 text-sm max-w-5xl min-h-screen mx-auto flex flex-col space-y-6 px-6 py-6"
  >
    <header class="flex flex-col items-center">
      <a href="/">
        <img src="/logo.svg" alt="Clockwork Carnage" class="h-16" />
      </a>
    </header>

    <nav
      class="flex w-fit mx-auto bg-gray-200/60 rounded-full p-1 align-items-center"
    >
      <a
        href="/"
        class="px-4 py-1.5 text-xs font-semibold uppercase tracking-wide rounded-full transition-colors hover:bg-white hover:shadow-sm"
      >
        Home
      </a>
      <a
        href="/events"
        class="px-4 py-1.5 text-xs font-semibold uppercase tracking-wide rounded-full transition-colors hover:bg-white hover:shadow-sm"
      >
        Events
      </a>
      <div class="w-px bg-gray-300/70 my-1 mx-0.5"></div>
      <div class="flex items-center gap-1.5 px-3">
        {% if let Some(uname) = page.current_user %}
        <span class="text-xs font-semibold text-gray-600">{{ uname }}</span>
        <span class="text-gray-300">·</span>
        <a
          href="/logout"
          class="text-xs text-gray-400 hover:text-gray-700 transition-colors"
          >Logout</a
        >
        {% else %}
        <a
          href="/login"
          class="text-xs text-gray-400 hover:text-gray-700 transition-colors"
          >Login</a
        >
        {% endif %}
      </div>
    </nav>

    <main>{% block content %}{% endblock %}</main>
  </body>
</html>
