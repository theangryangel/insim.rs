<!DOCTYPE html>
<html lang="en" class="bg-gray-50 text-gray-900">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Clockwork Carnage{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2" defer></script>
</head>
<body class="bg-gray-50 text-gray-900 text-sm max-w-5xl min-h-screen mx-auto flex flex-col space-y-6 px-6 py-6">

    <header class="flex flex-col items-center">
      <a href="/">
        <img src="/logo.svg" alt="Clockwork Carnage" class="h-16">
      </a>
    </header>

    <nav class="flex w-fit mx-auto bg-gray-200/60 rounded-full p-1 align-items-center">
      <a href="/" class="px-4 py-1.5 text-xs font-semibold uppercase tracking-wide rounded-full transition-colors hover:bg-white hover:shadow-sm">
        Home
      </a>
      <a href="/sessions" class="px-4 py-1.5 text-xs font-semibold uppercase tracking-wide rounded-full transition-colors hover:bg-white hover:shadow-sm">
        Sessions
      </a>
      <div class="w-px bg-gray-300/70 my-1 mx-0.5"></div>
      <div class="flex items-center gap-1.5 px-3">
        {% if let Some(uname) = page.current_user %}
          <span class="text-xs font-semibold text-gray-600">{{ uname }}</span>
          <span class="text-gray-300">·</span>
          <a href="/logout" class="text-xs text-gray-400 hover:text-gray-700 transition-colors">Logout</a>
        {% else %}
          <a href="/login" class="text-xs text-gray-400 hover:text-gray-700 transition-colors">Login</a>
        {% endif %}
      </div>
    </nav>

    <main>
      {% block content %}{% endblock %}
    </main>

    <footer class="mt-auto pt-4 border-t border-gray-200 text-xs text-gray-400 text-center">
      Built with <a href="https://github.com/theangryangel/insim.rs" class="underline hover:text-orange-600">insim.rs</a>
    </footer>
</body>
</html>
