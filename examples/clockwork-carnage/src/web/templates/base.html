<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Clockwork Carnage{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary-container": "#521300",
              "secondary": "#c8c6c5",
              "tertiary-container": "#3a90ff",
              "primary-container": "#ff5717",
              "outline-variant": "#5c4038",
              "on-secondary-container": "#bab8b7",
              "surface-container": "#201f1f",
              "surface-container-low": "#1c1b1b",
              "on-primary": "#5e1800",
              "surface-container-high": "#2a2a2a",
              "surface-variant": "#353534",
              "primary": "#ffb59e",
              "on-background": "#e5e2e1",
              "surface-dim": "#131313",
              "on-primary-fixed": "#3a0b00",
              "surface-container-highest": "#353534",
              "error": "#ffb4ab",
              "surface": "#131313",
              "surface-bright": "#3a3939",
              "surface-container-lowest": "#0e0e0e",
              "inverse-primary": "#ad3300",
              "background": "#131313",
              "secondary-container": "#4a4949",
              "on-surface-variant": "#e5beb2",
              "surface-tint": "#ffb59e",
              "primary-fixed-dim": "#ffb59e",
              "outline": "#ac897e",
              "inverse-surface": "#e5e2e1",
              "tertiary": "#a9c7ff",
              "on-surface": "#e5e2e1",
            },
            fontFamily: {
              "headline": ["Space Grotesk", "sans-serif"],
              "body": ["Inter", "sans-serif"],
              "label": ["Space Grotesk", "sans-serif"],
            },
            borderRadius: {
              "DEFAULT": "0px", "sm": "0px", "md": "0px",
              "lg": "0px", "xl": "0px", "2xl": "0px", "full": "9999px",
            },
          },
        },
      }
    </script>
    <style>
      [x-cloak] { display: none !important; }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        font-family: 'Material Symbols Outlined';
        font-style: normal;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-feature-settings: 'liga';
        -webkit-font-smoothing: antialiased;
      }
      .digital-cockpit-grid {
        background-image: radial-gradient(circle at 2px 2px, rgba(243, 75, 0, 0.05) 1px, transparent 0);
        background-size: 40px 40px;
      }
      .glow-primary { box-shadow: 0px 0px 15px rgba(255, 87, 23, 0.15); }
      .text-shear { transform: skewX(-10deg); }
    </style>
    <script src="https://unpkg.com/htmx.org@2" defer></script>
    <script>
      document.addEventListener("alpine:init", () => {
        Alpine.directive("localtime", (el, _bindings, { cleanup }) => {
          const raw = el.getAttribute("datetime");
          if (!raw) return;
          const date = new Date(raw);
          if (isNaN(date.getTime())) return;

          if (!el.hasAttribute("title")) {
            el.setAttribute("title", raw);
          }

          const THREE_HOURS = 3 * 60 * 60 * 1000;
          let timer = null;

          function render() {
            const diffMs = date - Date.now();
            if (diffMs > 0 && diffMs <= THREE_HOURS) {
              const totalSecs = Math.ceil(diffMs / 1000);
              const h = Math.floor(totalSecs / 3600);
              const m = Math.floor((totalSecs % 3600) / 60);
              const s = totalSecs % 60;
              el.textContent =
                h > 0
                  ? `in ${h}h ${String(m).padStart(2, "0")}m ${String(s).padStart(2, "0")}s`
                  : m > 0
                    ? `in ${m}m ${String(s).padStart(2, "0")}s`
                    : `in ${s}s`;
            } else {
              el.textContent = date.toLocaleString(undefined, {
                dateStyle: "short",
                timeStyle: "short",
              });
              if (diffMs <= 0 && timer) {
                clearInterval(timer);
                timer = null;
              }
            }
          }

          render();
          if (date > new Date()) {
            timer = setInterval(render, 1000);
          }
          cleanup(() => {
            if (timer) clearInterval(timer);
          });
        });
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js" defer></script>
  </head>
  <body class="bg-surface text-on-background font-body selection:bg-primary-container selection:text-white digital-cockpit-grid min-h-screen flex flex-col">

    <header class="flex justify-between items-center w-full px-6 md:px-12 py-5 bg-surface/90 backdrop-blur-md z-40 sticky top-0 border-b border-primary-container/10">

      <div class="max-w-7xl flex mx-auto flex-grow">
        <div class="flex items-center gap-10 mr-auto">
          <!-- <a href="/" class="flex items-center gap-3"> -->
          <!--   <img src="/assets/logo.svg" alt="Clockwork Carnage" class="h-10 w-auto" /> -->
          <!-- </a> -->
          <nav class="hidden lg:flex items-center gap-8">
            <a href="/" class="font-headline uppercase tracking-tighter text-on-background opacity-70 hover:text-primary-container hover:opacity-100 transition-all text-sm">Home</a>
            <a href="/events" class="font-headline uppercase tracking-tighter text-on-background opacity-70 hover:text-primary-container hover:opacity-100 transition-all text-sm">Events</a>
            <a href="/leaderboard" class="font-headline uppercase tracking-tighter text-on-background opacity-70 hover:text-primary-container hover:opacity-100 transition-all text-sm">Leaderboard</a>
          </nav>
        </div>
        <div class="flex items-center gap-6">
          {% if let Some(uname) = page.current_user %}
          <a href="/profile" class="font-headline text-xs uppercase tracking-widest text-on-background opacity-70 hover:opacity-100 transition-opacity">{{ uname }}</a>
          <a href="/logout" class="font-headline text-xs uppercase tracking-widest text-outline hover:text-primary-container transition-colors">Logout</a>
          {% else %}
          <a href="/login" class="font-headline text-xs uppercase tracking-widest text-outline hover:text-primary-container transition-colors">Login</a>
          {% endif %}
        </div>
      </div>
    </header>

    <main class="flex-1">{% block content %}{% endblock %}</main>
  </body>
</html>
