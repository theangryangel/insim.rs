{% macro mode_tag(mode, large, is_live) %}
{% if large %}
<div class="inline-flex items-center gap-2 px-3 py-1 mb-4 text-sm font-bold uppercase tracking-wider {{ mode.tag_classes() }}">
  <span>{{ mode.label() }}</span>
  {% if is_live %}
  <span class="opacity-60">|</span>
  <div class="flex items-center gap-1.5">
    <div class="w-1.5 h-1.5 rounded-full bg-primary-container live-indicator"></div>
    <span class="text-primary-container">LIVE</span>
  </div>
  {% endif %}
</div>
{% else %}
<span class="text-sm font-bold uppercase tracking-widest px-1.5 py-0.5 shrink-0 {{ mode.tag_classes() }}">{{ mode.label() }}</span>
{% endif %}
{% endmacro %}
