{# ── Standings ── #}
<section class="mb-6" id="metronome-standings"
  {% match event.status %}
    {% when EventStatus::Active %}
      hx-get="/events/{{ event.id }}/standings"
      hx-trigger="every 5s"
      hx-swap="outerHTML"
    {% when _ %}
  {% endmatch %}
>
  <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Best Deltas</p>
  <table class="w-full">
    <thead>
      <tr class="text-left text-xs text-gray-400 uppercase tracking-wider font-semibold border-b border-gray-200">
        <th class="py-2 pr-2 w-8">#</th>
        <th class="py-2 px-2">Driver</th>
        <th class="py-2 px-2 text-right">Best Delta</th>
        <th class="py-2 pl-2 text-right">Tier</th>
      </tr>
    </thead>
    <tbody>
      {% include "partials/metronome_standings_content.html" %}
    </tbody>
  </table>
</section>
