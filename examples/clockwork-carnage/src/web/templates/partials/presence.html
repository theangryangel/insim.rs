{% import "partials/player_name.html" as macros %}
<section
  id="presence"
  hx-get="/presence"
  hx-trigger="every 10s"
  hx-swap="outerHTML"
>
  {% if connections.is_empty() %}
  <p class="font-headline text-xs uppercase tracking-widest text-outline py-8 text-center">No players connected.</p>
  {% else %}
  <div class="flex flex-col gap-3">
    {% for conn in connections %}
    <div class="bg-surface-container-low/50 px-5 py-4 flex items-center gap-4 border border-white/5 hover:bg-surface-container-low transition-colors">
      <span class="w-2 h-2 bg-tertiary-container rounded-full flex-shrink-0 shadow-[0_0_8px_#3a90ff]"></span>
      <div class="flex-1 min-w-0">
        <div class="font-headline font-bold uppercase text-sm truncate">
          {% call macros::player_name(conn.pname, conn.uname, conn.twitch_username, conn.youtube_username) %}{% endcall %}
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
  {% endif %}
</section>
