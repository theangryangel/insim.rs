<section
  id="presence"
  class="mt-6"
  hx-get="/presence"
  hx-trigger="every 10s"
  hx-swap="outerHTML"
>
  <p
    class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2"
  >
    Connected Players
  </p>
  {% if connections.is_empty() %}
  <p class="text-center text-xs text-gray-300 font-mono py-4">No players connected.</p>
  {% else %}
  <div class="flex flex-col gap-1">
    {% for conn in connections %}
    <div
      class="flex items-center gap-2 py-1.5 px-3 bg-white rounded-lg border border-gray-200"
    >
      <span class="h-2 w-2 bg-green-500 rounded-full flex-shrink-0"></span>
      <span class="text-sm font-medium">{{ conn.pname }}</span>
      <span class="text-xs text-gray-400 ml-auto font-mono">{{ conn.uname }}</span>
    </div>
    {% endfor %}
  </div>
  {% endif %}
</section>
