{# ── Times ── #}
<section class="mb-6" id="climb-standings">
  <div class="flex items-center justify-between mb-2">
    <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Times</p>
  </div>
  <div x-data="{ tab: 'best' }">
    <div class="flex bg-gray-100 rounded p-0.5 text-xs font-semibold mb-3">
      <button @click="tab = 'best'"
        :class="tab === 'best' ? 'bg-white shadow-sm text-gray-700' : 'text-gray-400 hover:text-gray-700'"
        class="px-2.5 py-1 rounded transition-colors">Best Times</button>
      <button @click="tab = 'all'"
        :class="tab === 'all' ? 'bg-white shadow-sm text-gray-700' : 'text-gray-400 hover:text-gray-700'"
        class="px-2.5 py-1 rounded transition-colors">All Times</button>
    </div>

    <div x-show="tab === 'best'">
      <div
        {% match event.status %}
          {% when EventStatus::Active %}
            hx-get="/events/{{ event.id }}/standings/climb/best"
            hx-trigger="every 5s"
            hx-swap="innerHTML"
          {% when _ %}
        {% endmatch %}
      >
        {% include "partials/climb_best_times_content.html" %}
      </div>
    </div>
    <div x-show="tab === 'all'" x-cloak>
      <div
        {% match event.status %}
          {% when EventStatus::Active %}
            hx-get="/events/{{ event.id }}/standings/climb/all"
            hx-trigger="every 5s"
            hx-swap="innerHTML"
          {% when _ %}
        {% endmatch %}
      >
        {% include "partials/climb_all_times_content.html" %}
      </div>
    </div>
  </div>
</section>
