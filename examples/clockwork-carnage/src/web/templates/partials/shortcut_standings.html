<section id="shortcut-standings">
  <div class="flex justify-between items-end border-l-4 border-primary-container pl-4 mb-4">
    <h2 class="font-headline text-2xl font-black uppercase tracking-tight">Times</h2>
    {% match event.status %}
    {% when EventStatus::Active %}
    <span class="font-headline text-xs text-outline uppercase tracking-widest pb-1">Live</span>
    {% when _ %}
    {% endmatch %}
  </div>
  <div x-data="{ tab: 'best' }">
    <div class="flex bg-surface-container-highest text-xs font-bold mb-4">
      <button
        @click="tab = 'best'"
        :class="tab === 'best' ? 'bg-primary-container text-white' : 'text-outline hover:text-on-background'"
        class="font-headline uppercase tracking-widest px-5 py-2.5 transition-colors"
      >Best Times</button>
      <button
        @click="tab = 'all'"
        :class="tab === 'all' ? 'bg-primary-container text-white' : 'text-outline hover:text-on-background'"
        class="font-headline uppercase tracking-widest px-5 py-2.5 transition-colors"
      >All Times</button>
    </div>

    <div x-show="tab === 'best'">
      <div
        class="bg-surface-container-low overflow-hidden"
        {% match event.status %}
        {% when EventStatus::Active %}
        hx-get="/events/{{ event.id }}/standings/best"
        hx-trigger="every 5s"
        hx-swap="innerHTML"
        {% when _ %}
        {% endmatch %}
      >
        {% include "partials/shortcut_best_times_content.html" %}
      </div>
    </div>
    <div x-show="tab === 'all'" x-cloak>
      <div
        class="bg-surface-container-low overflow-hidden"
        {% match event.status %}
        {% when EventStatus::Active %}
        hx-get="/events/{{ event.id }}/standings/all"
        hx-trigger="every 5s"
        hx-swap="innerHTML"
        {% when _ %}
        {% endmatch %}
      >
        {% include "partials/shortcut_all_times_content.html" %}
      </div>
    </div>
  </div>
</section>
