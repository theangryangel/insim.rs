[package]
name = "clockwork-carnage"
version = "0.1.0"
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true
license.workspace = true
homepage.workspace = true
publish = false

[dependencies]
anyhow = "1"
axum = "0.8"
axum-login = "0.18"
clap = { workspace = true, features = ["derive", "env"] }
insim = { path = "../../insim", features = ["serde"] }
kitcar = { path = "../../kitcar" }
parking_lot = { workspace = true }
oauth2 = { version = "4", features = ["reqwest"] }
reqwest = { version = "0.12", features = ["json"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
jiff = { version = "0.2", features = ["serde"] }
jiff-sqlx = { version = "0.1.1", features = ["postgres"] }
maud = "0.27"
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "migrate"] }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros", "signal", "time", "sync"] }
tower-sessions = { version = "0.14", features = ["private"] }
tower-sessions-sqlx-store = { version = "0.15", features = ["postgres"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
rust-embed = "8.11.0"
mime_guess = "2.0.5"
serde_urlencoded = "0.7"
validator = { version = "0.20", features = ["derive"] }

[lints]
workspace = true
