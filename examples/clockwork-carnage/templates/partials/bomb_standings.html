{# ── Runs ── #}
<section class="mb-6" id="bomb-standings">
  <div class="flex items-center justify-between mb-2">
    <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Runs</p>
    <div id="standings-tabs" class="flex bg-gray-100 rounded p-0.5 text-xs font-semibold">
      <button hx-get="/sessions/{{ session.id }}/standings/bomb/best"
              hx-target="#standings-content"
              hx-swap="outerHTML"
              class="px-2.5 py-1 rounded bg-white shadow-sm text-gray-700 transition-colors">
        Best Runs
      </button>
      <button hx-get="/sessions/{{ session.id }}/standings/bomb/all"
              hx-target="#standings-content"
              hx-swap="outerHTML"
              class="px-2.5 py-1 rounded text-gray-400 hover:text-gray-700 transition-colors">
        All Runs
      </button>
    </div>
  </div>
  {% include "partials/bomb_best_runs_content.html" %}
</section>
