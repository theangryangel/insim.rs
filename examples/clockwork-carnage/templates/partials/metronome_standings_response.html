{% include "partials/metronome_standings_content.html" %}
<div id="metronome-tabs" hx-swap-oob="true" class="flex flex-wrap gap-0.5 bg-gray-100 rounded p-0.5 text-xs font-semibold mb-3">
  <button hx-get="/sessions/{{ session.id }}/standings"
          hx-target="#metronome-content"
          hx-swap="outerHTML"
          class="px-2.5 py-1 rounded bg-white shadow-sm text-gray-700 transition-colors">
    Standings
  </button>
  {% for round in metronome_rounds %}
  <button hx-get="/sessions/{{ session.id }}/rounds/{{ round.round }}"
          hx-target="#metronome-content"
          hx-swap="outerHTML"
          class="px-2.5 py-1 rounded text-gray-400 hover:text-gray-700 transition-colors">
    Round {{ round.round }}
  </button>
  {% endfor %}
</div>
