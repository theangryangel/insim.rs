<!DOCTYPE html>
<html lang="en" class="bg-gray-50 text-gray-900">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Clockwork Carnage{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 max-w-lg min-h-screen mx-auto flex flex-col space-y-6 px-6 py-6">

    <header class="flex flex-col items-center">
      <a href="/">
        <img src="/logo.svg" alt="Clockwork Carnage" class="h-16">
      </a>
    </header>

    <nav class="flex bg-gray-200/60 rounded-full p-1">
      <a href="/" class="flex-1 text-center py-1.5 text-xs font-semibold uppercase tracking-wide rounded-full transition-colors hover:bg-white hover:shadow-sm">
        Home
      </a>
      <a href="/sessions" class="flex-1 text-center py-1.5 text-xs font-semibold uppercase tracking-wide rounded-full transition-colors hover:bg-white hover:shadow-sm">
        Sessions
      </a>
      <a href="/about" class="flex-1 text-center py-1.5 text-xs font-semibold uppercase tracking-wide rounded-full transition-colors hover:bg-white hover:shadow-sm">
        About
      </a>
    </nav>

    <main>
      {% block content %}{% endblock %}
    </main>
</body>
</html>
