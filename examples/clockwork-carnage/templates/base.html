<!DOCTYPE html>
<html lang="en" class="bg-gray-50 text-gray-900">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Clockwork Carnage{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex flex-col">
  <nav class="bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-6">
      <a href="/" class="flex items-center gap-2">
        <img src="/logo.png" alt="Clockwork Carnage" class="h-8">
      </a>
      <a href="/events" class="text-gray-500 hover:text-gray-900 text-sm">Events</a>
      <a href="/challenges" class="text-gray-500 hover:text-gray-900 text-sm">Challenges</a>
    </div>
  </nav>
  <main class="max-w-7xl mx-auto px-4 py-8 flex-1 w-full">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
