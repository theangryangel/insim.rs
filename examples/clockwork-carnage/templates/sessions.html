{% extends "base.html" %}
{% block title %}Sessions — Clockwork Carnage{% endblock %}
{% block content %}

<div class="flex flex-col gap-8">
  {% for session in sessions %}
    <a href="/sessions/{{ session.id }}" class="block bg-white border border-gray-200 rounded-lg p-4 hover:border-orange-300 transition-colors">
      <div class="flex items-center justify-between mb-2">
        <span class="text-xs font-mono text-gray-400">#{{ session.id }}</span>
      </div>
      <p class="font-semibold text-sm">{{ session.track }} — {{ session.layout }}</p>
    </a>
  {% endfor %}
</div>
{% endblock %}
