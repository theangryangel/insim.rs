# A walled drop chute: an M4_00 ramp (maximum height, short Two-length base)
# creates a near-vertical launch/descent face. Funnelling walls keep the car
# on track as it hurtles down. Use at the back side of a summit.
#
# The main drop face: short Two-length ramp at max height = very steep gradient
- !ConcreteRamp
  xyz:
    x: 0
    y: 0
    z: 0
  width: Four
  length: Two
  height: M4_00
  heading:
    radians: 3.141592653589793
# Funnel walls guiding the car into the drop face — angled inward
- !ConcreteRampWall
  xyz:
    x: 0
    y: -40
    z: 0
  colour: Red
  length: Two
  height: M4_00
  heading:
    radians: 3.141592653589793
- !ConcreteRampWall
  xyz:
    x: 0
    y: 40
    z: 0
  colour: Red
  length: Two
  height: M4_00
  heading:
    radians: 3.141592653589793
# Run-out slab at the base — give landing area before the next section
- !ConcreteSlab
  xyz:
    x: -32
    y: 0
    z: 0
  width: Four
  length: Four
  pitch: Deg0
  heading:
    radians: 0.0
# Approach cones at the lip of the drop
- !ConeTall1
  xyz:
    x: 32
    y: -24
    z: 16
  colour: Red
  heading:
    radians: 0.0
  floating: false
- !ConeTall1
  xyz:
    x: 32
    y: 24
    z: 16
  colour: Red
  heading:
    radians: 0.0
  floating: false
- !ChalkAhead
  xyz:
    x: 64
    y: 0
    z: 16
  colour: Red
  heading:
    radians: 3.141592653589793
  floating: false
