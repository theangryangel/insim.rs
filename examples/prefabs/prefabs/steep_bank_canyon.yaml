# A wall-of-death canyon: two Sixteen-length SlabWalls at steep pitch flank the
# racing line. Bank the car into either wall to hold a tight radius at speed.
# Both walls run parallel along x; the channel between them is ~80 units wide.
- !ConcreteSlabWall
  xyz:
    x: 0
    y: -48
    z: 0
  colour: Grey
  length: Sixteen
  pitch: Deg60
  heading:
    radians: 0.0
- !ConcreteSlabWall
  xyz:
    x: 0
    y: 48
    z: 0
  colour: Grey
  length: Sixteen
  pitch: Deg60
  heading:
    radians: 3.141592653589793
# Bright entry gate cones so the mouth of the canyon reads clearly
- !ConeTall2
  xyz:
    x: -16
    y: -48
    z: 0
  colour: Orange
  heading:
    radians: 0.0
  floating: false
- !ConeTall2
