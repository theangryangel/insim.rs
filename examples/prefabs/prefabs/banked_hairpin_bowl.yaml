# A 180-degree banked bowl hairpin using ConcreteSlabWalls at high pitch.
# The inner and outer walls of the hairpin are both banked inward so the car
# can lean on the banking to scrub speed naturally through the turn.
#
# Outer wall — long banking on the outside of the 180 turn (runs along x)
- !ConcreteSlabWall
  xyz:
    x: 0
    y: 80
    z: 0
  colour: Grey
  length: Sixteen
  pitch: Deg42
  heading:
    radians: 0.0
# Inner wall (shorter — inner radius of hairpin)
- !ConcreteSlabWall
  xyz:
    x: 64
    y: 16
    z: 0
  colour: Grey
  length: Eight
  pitch: Deg42
  heading:
    radians: 3.141592653589793
# Cap wall across the end of the hairpin — highest banking, catches exit overshots
- !ConcreteSlabWall
  xyz:
    x: 256
    y: 48
    z: 0
  colour: Yellow
  length: Four
  pitch: Deg54
  heading:
    radians: 1.5707963267948966
# Entry guide cones (approach from -x)
- !Cone1
  xyz:
    x: -32
    y: 48
    z: 0
  colour: Blue
  heading:
    radians: 0.0
  floating: false
- !Cone1
  xyz:
    x: -32
    y: 16
    z: 0
  colour: Blue
  heading:
    radians: 0.0
  floating: false
# Apex marker
- !ConeTall2
  xyz:
    x: 256
    y: 48
    z: 0
  colour: Orange
  heading:
    radians: 0.0
  floating: false
- !ChalkLeft
  xyz:
    x: -64
    y: 32
    z: 0
  colour: White
  heading:
    radians: 0.0
  floating: false
