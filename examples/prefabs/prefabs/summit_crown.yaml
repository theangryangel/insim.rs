# A decorative summit marker: six M4_00 pillars arranged in a crown,
# topped with a continuous overhead slab ring and two crossed SlabWalls.
# Drop this at the highest point of a climb map to signal the top.
#
# Crown pillars — hexagonal-ish arrangement centred on x=0, y=0
- !ConcretePillar
  xyz:
    x: 0
    y: -64
    z: 0
  x: Half
  y: Half
  height: M4_00
  heading:
    radians: 0.0
- !ConcretePillar
  xyz:
    x: 0
    y: 64
    z: 0
  x: Half
  y: Half
  height: M4_00
  heading:
    radians: 0.0
- !ConcretePillar
  xyz:
    x: -56
    y: -32
    z: 0
