# Parking-garage spiral: three ramp sections separated by 90-degree turn platforms.
# Heading rotates +90° at each platform, so the course spirals counter-clockwise
# when viewed from above. Net gain: 3 × M2_00 = 6 m (z=24).
#
# Leg 1: east  (+x, heading=0)   z 0→8
- !ConcreteRamp
  xyz:
    x: 0
    y: 0
    z: 0
  width: Four
  length: Four
  height: M2_00
  heading:
    radians: 0.0
- !ConcreteWall
  xyz:
    x: 0
    y: -40
    z: 0
  colour: Grey
  length: Four
  height: M2_00
  heading:
    radians: 0.0
- !ConcreteWall
  xyz:
    x: 0
    y: 40
    z: 0
  colour: Grey
  length: Four
  height: M2_00
  heading:
    radians: 0.0
# Turn platform 1 — wide slab to let the car pivot north
- !ConcreteSlab
  xyz:
    x: 64
    y: 0
    z: 8
  width: Eight
  length: Four
  pitch: Deg0
  heading:
    radians: 0.0
- !ChalkRight
  xyz:
    x: 96
    y: -32
    z: 8
  colour: White
  heading:
    radians: 0.0
  floating: false
# Leg 2: north (+y, heading=π/2)  z 8→16
- !ConcreteRamp
  xyz:
    x: 64
    y: 96
    z: 8
  width: Four
  length: Four
  height: M2_00
  heading:
    radians: 1.5707963267948966
- !ConcreteWall
  xyz:
    x: 24
    y: 96
    z: 8
  colour: Grey
  length: Four
  height: M2_00
  heading:
    radians: 1.5707963267948966
- !ConcreteWall
  xyz:
    x: 104
    y: 96
    z: 8
  colour: Grey
  length: Four
  height: M2_00
  heading:
    radians: 1.5707963267948966
# Turn platform 2 — pivot to head west
- !ConcreteSlab
  xyz:
    x: 64
    y: 160
    z: 16
  width: Eight
  length: Four
  pitch: Deg0
  heading:
    radians: 1.5707963267948966
- !ChalkRight
  xyz:
    x: 96
    y: 192
    z: 16
  colour: White
  heading:
    radians: 1.5707963267948966
  floating: false
# Leg 3: west  (-x, heading=π)   z 16→24  — final climb to the summit
- !ConcreteRamp
  xyz:
    x: 0
    y: 160
    z: 16
  width: Four
  length: Four
  height: M2_00
  heading:
    radians: 3.141592653589793
- !ConcreteWall
  xyz:
    x: 0
    y: 120
    z: 16
  colour: Yellow
  length: Four
  height: M2_00
  heading:
    radians: 3.141592653589793
- !ConcreteWall
  xyz:
    x: 0
    y: 200
    z: 16
  colour: Yellow
  length: Four
  height: M2_00
  heading:
    radians: 3.141592653589793
# Summit landing slab at z=24 (6 m)
- !ConcreteSlab
  xyz:
    x: -64
    y: 160
    z: 24
  width: Four
  length: Four
  pitch: Deg0
  heading:
    radians: 3.141592653589793
