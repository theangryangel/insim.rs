# prefabs.climb.yaml
# Climb map building blocks for Live for Speed autocross layouts.
# Coordinate scale: x/y 1 unit = 6.25 cm (1/16 m), z 1 unit = 25 cm (1/4 m)
# All positions are relative to the anchor (first object placed at 0,0,0).
# Headings are in radians. Adjust in-game after placement as needed.

- name: launch_ramp
  objects:
    - !ConcreteRamp
      xyz:
        x: 0
        y: 0
        z: 0
      width: Four
      length: Four
      height: M1_00
      heading:
        radians: 0.0
    - !ConcreteWall
      xyz:
        x: 0
        y: -40
        z: 0
      colour: Grey
      length: Four
      height: M1_50
      heading:
        radians: 0.0
