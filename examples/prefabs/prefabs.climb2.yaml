# prefabs.climb2.yaml
# Extended climb map building blocks — wacky / creative edition.
# Coordinate scale: x/y 1 unit = 6.25 cm (1/16 m), z 1 unit = 25 cm (1/4 m)
# Two=32, Four=64, Eight=128, Sixteen=256 units. z: M1_00=4, M2_00=8, M4_00=16
# All positions relative to anchor. Headings in radians.

# 1. switchback_climb
# Drive up Ramp 1 (going +x), steer right across a wide platform, up Ramp 2
# (offset +y=64), then summit. Two climbs in one lateral-switchback structure.
- name: switchback_climb
  objects:
  - !ConcreteRamp
    xyz:
      x: 0
      y: 0
      z: 0
    width: Four
    length: Four
    height: M2_00
    heading:
      radians: 0.0
  - !ConcreteWall
    xyz:
      x: 0
      y: -40
      z: 0
    colour: Grey
    length: Four
    height: M2_00
    heading:
      radians: 0.0
  - !ConcreteWall
    xyz:
      x: 0
      y: 40
      z: 0
    colour: Grey
    length: Four
    height: M2_00
    heading:
      radians: 0.0
  # Wide steering platform at top of ramp 1 (z=8), Eight wide to let player
  # steer laterally from y=0 lane to y=64 lane for ramp 2.
  - !ConcreteSlab
    xyz:
      x: 64
      y: 32
      z: 8
    width: Eight
    length: Four
    pitch: Deg0
    heading:
      radians: 0.0
  - !ChalkRight
    xyz:
      x: 80
      y: 0
      z: 8
    colour: White
    heading:
      radians: 0.0
    floating: false
  # Outer guard wall on the wide platform edge
  - !ConcreteWall
    xyz:
      x: 64
      y: 104
      z: 8
    colour: Yellow
    length: Four
    height: M1_00
    heading:
      radians: 0.0
  - !ConcreteRamp
    xyz:
      x: 128
      y: 64
      z: 8
    width: Four
    length: Four
    height: M2_00
    heading:
      radians: 0.0
  - !ConcreteWall
    xyz:
      x: 128
      y: 24
      z: 8
    colour: Grey
    length: Four
    height: M2_00
    heading:
      radians: 0.0
  - !ConcreteWall
    xyz:
      x: 128
      y: 104
      z: 8
    colour: Grey
    length: Four
    height: M2_00
    heading:
      radians: 0.0
  # Summit slab at z=16 (4m up)
  - !ConcreteSlab
    xyz:
      x: 192
      y: 64
      z: 16
    width: Four
    length: Two
    pitch: Deg0
    heading:
      radians: 0.0
  - !ChalkAhead
    xyz:
      x: -32
      y: 0
      z: 0
    colour: Yellow
    heading:
      radians: 0.0
    floating: false

# 2. pillar_forest
# Staggered grid of Half×Half concrete pillars to weave through at speed.
# Row 1 blocks y=0; row 2 has tight ±24 inner guards; row 3 repeats.
# Gap between adjacent pillars ~40 units (2.5m) — tight but drivable.
- name: pillar_forest
  objects:
  - !ChalkAhead
    xyz:
      x: -48
      y: 0
      z: 0
    colour: White
    heading:
      radians: 0.0
    floating: false
  - !ConeTall1
    xyz:
      x: -32
      y: -40
      z: 0
    colour: Yellow
    heading:
      radians: 0.0
    floating: false
  - !ConeTall1
    xyz:
      x: -32
      y: 40
      z: 0
    colour: Yellow
    heading:
      radians: 0.0
    floating: false
  # Row 1: y=0 blocked
  - !ConcretePillar
    xyz:
      x: 0
      y: -48
      z: 0
    x: Half
    y: Half
    height: M2_00
    heading:
      radians: 0.0
  - !ConcretePillar
    xyz:
      x: 0
      y: 0
      z: 0
    x: Half
    y: Half
    height: M2_00
    heading:
      radians: 0.0
  - !ConcretePillar
    xyz:
      x: 0
      y: 48
      z: 0
    x: Half
    y: Half
    height: M2_00
    heading:
      radians: 0.0
  # Row 2: tight inner gates at y=±24
  - !ConcretePillar
    xyz:
      x: 80
      y: -72
      z: 0
    x: Half
    y: Half
    height: M2_00
    heading:
      radians: 0.0
  - !ConcretePillar
    xyz:
      x: 80
      y: -24
      z: 0
    x: Half
    y: Half
    height: M2_00
    heading:
      radians: 0.0
  - !ConcretePillar
    xyz:
      x: 80
      y: 24
      z: 0
    x: Half
    y: Half
    height: M2_00
    heading:
      radians: 0.0
  - !ConcretePillar
    xyz:
      x: 80
      y: 72
      z: 0
    x: Half
    y: Half
    height: M2_00
    heading:
      radians: 0.0
  # Row 3: y=0 blocked again
  - !ConcretePillar
    xyz:
      x: 160
      y: -48
      z: 0
    x: Half
    y: Half
    height: M2_00
    heading:
      radians: 0.0
  - !ConcretePillar
    xyz:
      x: 160
      y: 0
      z: 0
    x: Half
    y: Half
    height: M2_00
    heading:
      radians: 0.0
  - !ConcretePillar
    xyz:
      x: 160
      y: 48
      z: 0
    x: Half
    y: Half
    height: M2_00
    heading:
      radians: 0.0

