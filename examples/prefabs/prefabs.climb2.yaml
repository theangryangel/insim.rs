      z: 0
    colour: Grey
    length: Four
    height: M2_00
    heading:
      radians: 0.0
  # Raised platform (8m long, 4m wide, at z=8)
  - !ConcreteSlab
    xyz:
      x: 64
      y: 0
      z: 8
    width: Four
    length: Eight
    pitch: Deg0
    heading:
      radians: 0.0
  # Low side walls on platform edges
  - !ConcreteWall
    xyz:
      x: 64
      y: -40
      z: 8
    colour: Grey
