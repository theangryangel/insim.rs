# 14. zigzag_walls
# Three ConcreteWall panels placed perpendicular to the road (heading=π/2),
# each blocking roughly half of it from alternating sides. Chalk arrows show
# the correct path. Go wrong and meet a wall face-on.
- name: zigzag_walls
  objects:
  - !ChalkRight
    xyz:
      x: -48
      y: 0
      z: 0
    colour: White
    heading:
      radians: 0.0
    floating: false
  # Wall 1: blocks y=-40 to y=0 (left half). Open path on right (y > 0).
  - !ConcreteWall
    xyz:
      x: 64
      y: -40
      z: 0
    colour: Red
    length: Two
    height: M2_00
    heading:
      radians: 1.5707963267948966
  - !Cone1
    xyz:
      x: 64
      y: 48
      z: 0
    colour: Blue
    heading:
      radians: 0.0
    floating: false
  - !ChalkLeft
    xyz:
      x: 96
      y: 0
      z: 0
    colour: White
    heading:
      radians: 0.0
    floating: false
  # Wall 2: blocks y=0 to y=+40 (right half). Open path on left (y < 0).
  - !ConcreteWall
    xyz:
      x: 160
      y: 8
      z: 0
    colour: Blue
    length: Two
    height: M2_00
    heading:
      radians: 1.5707963267948966
  - !Cone1
    xyz:
      x: 160
      y: -48
      z: 0
    colour: Red
    heading:
      radians: 0.0
    floating: false
  - !ChalkRight
    xyz:
      x: 192
      y: 0
      z: 0
    colour: White
    heading:
      radians: 0.0
    floating: false
  # Wall 3: blocks left half again
  - !ConcreteWall
    xyz:
      x: 256
      y: -40
      z: 0
    colour: Red
    length: Two
    height: M2_00
    heading:
      radians: 1.5707963267948966
  - !Cone1
