    heading:
      radians: 0.0
  - !ConcreteWall
    xyz:
      x: 64
      y: 40
      z: 8
    colour: Grey
    length: Eight
    height: M0_50
    heading:
      radians: 0.0
  # Corner tyre markers on the platform
  - !TyreStack4
