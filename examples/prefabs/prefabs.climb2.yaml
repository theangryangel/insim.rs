    floating: false

# 15. table_top_jump
# Classic tabletop: approach ramp rises 2m onto a flat elevated Eight-long
# platform, then a mirrored exit ramp drops back to ground. Platform has
# low side walls and tyre corner markers. Very controllable but very satisfying.
- name: table_top_jump
  objects:
  - !ChalkAhead
    xyz:
      x: -32
      y: 0
      z: 0
    colour: Yellow
    heading:
      radians: 0.0
    floating: false
  # Approach ramp
  - !ConcreteRamp
    xyz:
      x: 0
      y: 0
      z: 0
    width: Four
    length: Four
    height: M2_00
    heading:
      radians: 0.0
  - !ConcreteWall
    xyz:
      x: 0
      y: -40
      z: 0
    colour: Grey
    length: Four
    height: M2_00
    heading:
      radians: 0.0
