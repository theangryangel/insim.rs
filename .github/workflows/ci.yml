name: ci
on:
  pull_request:
    branches:
      - main

env:
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # setup-python is needed for the local ruff hooks (language = "python").
      - uses: actions/setup-python@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: j178/prek-action@v2

  check_codepage_lut:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check generated codepage LUT (lookup table) is up to date
        run: |
          cargo run -p xtask-codepage-lut
          git diff --exit-code -- insim_core/src/string/codepages_lut.rs

  test:
    runs-on: ubuntu-latest
    needs: [prek, check_codepage_lut]
    strategy:
      matrix:
        channel: [stable, nightly]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.channel }}
      - uses: Swatinem/rust-cache@v2
      - name: Run cargo test (all-features)
        run: cargo test --all --all-targets --all-features
      - name: Run cargo test (default features)
        run: cargo test --all --all-targets

  test_insim_o3:
    runs-on: ubuntu-latest
    needs: [prek, check_codepage_lut]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v9.0.0
      - name: Regenerate insim_schema.json and packets.py
        # xtask writes the schema, then shells out to
        # insim_o3/scripts/generate_packets.py (uv run --no-project) to
        # emit packets.py.
        run: cargo run -p xtask-insim-o3-schema
      - name: Verify generated schema and packets.py are committed up-to-date
        run: git diff --exit-code -- insim_o3/insim_schema.json insim_o3/python/insim_o3/packets.py
      - run: uv sync --dev
        working-directory: insim_o3
      - run: uv run --extra dev maturin develop
        working-directory: insim_o3
      - run: uv run --extra dev pytest
        working-directory: insim_o3
      - run: uv run --extra dev mypy python/insim_o3/ examples/
        working-directory: insim_o3

  docs:
    runs-on: ubuntu-latest
    needs: [prek]
    strategy:
      matrix:
        channel: [stable, nightly]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.channel }}
      - uses: Swatinem/rust-cache@v2
      - name: Run cargo doc
        run: cargo doc --no-deps

  msrv:
    runs-on: ubuntu-latest
    needs: [prek, check_codepage_lut]
    steps:
      - uses: actions/checkout@v7
      - name: Get MSRV from package metadata
        id: msrv
        run: grep rust-version Cargo.toml | cut -d'"' -f2 | sed 's/^/version=/' >> $GITHUB_OUTPUT
      - name: Install rust (${{ steps.msrv.outputs.version }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}
      - uses: Swatinem/rust-cache@v2
      - name: Run cargo check
        run: cargo check --all-targets --all-features
